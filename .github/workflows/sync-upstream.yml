name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（北京时间 10:00）自动运行
  workflow_dispatch:       # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git -c user.name="github-actions[bot]" \
          git -c user.email="github-actions[bot]@users.noreply.github.com" \
          git remote add upstream https://github.com/jay3-yy/BiliPai.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-ff -m "chore: merge upstream/main"
          git push origin main
