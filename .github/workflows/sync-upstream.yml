name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'        # 每天 UTC 02:00 = 北京时间 10:00
  workflow_dispatch:            # 允许在 Actions 页面手动触发

permissions:
  contents: write              # 授予 GITHUB_TOKEN 写权限，无需自建 secret

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        # ↓↓↓ 务必把「上游所有者/上游仓库名」换成真实地址，例如 octocat/hello-world
        run: git remote add upstream https://github.com/jay3-yy/BiliPai.git

      - name: Show remotes (debug)
        run: git remote -v

      - name: Fetch upstream
        run: git fetch upstream

      - name: Show upstream branches (debug)
        run: git branch -r

      - name: Checkout default branch
        run: git checkout main     # 若你的 fork 默认分支是 master，改这里

      - name: Merge upstream
        run: |
          UPSTREAM_BRANCH=$(git ls-remote --symref upstream HEAD | grep '^ref:' | sed 's@.*/heads/@@; s@\t.*@@')
          echo "Upstream default branch: $UPSTREAM_BRANCH"
          git merge "upstream/$UPSTREAM_BRANCH" --no-ff -m "chore: merge upstream/$UPSTREAM_BRANCH"

      - name: Push to fork
        run: git push origin main    # 与上面 checkout 的分支保持一致
